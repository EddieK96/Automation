# Setup Hooks Configuration
# Specify GitHub repositories that contain setup scripts to run after Arch installation.
#
# Format: GITHUB_REPO_URL SCRIPT_RELATIVE_PATH [SCRIPT_RELATIVE_PATH ...]
#
# Example:
# https://github.com/user/repo.git  setup/init.sh setup/extra.sh
# https://github.com/other/dotfiles.sh  dotfiles/install.sh
#
# For offline mode: scripts are embedded in the ISO during build and run locally.
# For online mode: scripts are cloned fresh at install time and run.
#
# Lines starting with # are comments.
# Empty lines are ignored.

# Example (uncomment and customize):
# https://github.com/EddieK96/Automation.sh  post-install/setup.sh
